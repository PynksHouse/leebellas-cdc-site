<!DOCTYPE html>
<html>
<head>

<title>Join Waitlist | Lee-Bella's CDC</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f6f3ea;
}

.logo{
width:300px;
margin-top:40px;
}

.section{
max-width:600px;
margin:auto;
padding:40px;
}

input{
width:100%;
padding:12px;
margin:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#7fa685;
color:white;
border:none;
padding:14px 24px;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<img src="logo.png" class="logo">

<div class="section">

<h1>Join Our Waitlist</h1>

<p>
Fill out the form below and we will notify you when enrollment opens.
</p>

<form action="mailto:youremail@email.com" method="post" enctype="text/plain">

<input type="text" name="Name" placeholder="Your Name" required>

<input type="email" name="Email" placeholder="Your Email" required>

<input type="text" name="Child Age" placeholder="Child Age">

<button type="submit">Join Waitlist</button>

</form>

<br>

<button onclick="location.href='index.html'">Back Home</button>

</div>

</body>
</html>
