<!DOCTYPE html>
<html>
<head>
  <title>Enrollment | Lee-Bella's CDC</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;margin:0;background:#f6f3ea;color:#4d6470;text-align:center}
    header,footer{background:#fff;padding:25px}
    .logo{width:220px;max-width:90%}
    .content{max-width:800px;margin:auto;padding:50px 20px}
    form{
      background:#fff;padding:25px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.08)
    }
    input,select,textarea{
      width:90%;max-width:550px;padding:12px;margin:10px 0;border:1px solid #ccc;border-radius:8px
    }
    button{
      background:#89a98f;color:#fff;border:none;padding:14px 24px;border-radius:8px;
      font-size:16px;font-weight:bold;cursor:pointer;margin-top:10px
    }
    nav a{
      display:inline-block;margin:6px;padding:10px 18px;text-decoration:none;
      background:#89a98f;color:#fff;border-radius:8px;font-weight:bold
    }
    footer{background:#5f7f8c;color:#fff;margin-top:40px}
  </style>
</head>
<body>

<header>
  <img src="logo.png" class="logo" alt="Logo">
  <nav>
    <a href="index.html">Home</a>
    <a href="programs.html">Programs</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<div class="content">
  <h1>Enrollment Application</h1>
  <p>Submit your enrollment interest and we will follow up with next steps.</p>

  <form action="mailto:lee-bellas-NPLH@outlook.com" method="post" enctype="text/plain">
    <input type="text" name="Parent Name" placeholder="Parent/Guardian Name" required><br>
    <input type="email" name="Email" placeholder="Email Address" required><br>
    <input type="text" name="Phone" placeholder="Phone Number"><br>
    <input type="text" name="Child Name" placeholder="Child Name"><br>
    <input type="text" name="Child Age" placeholder="Child Age"><br>
    <select name="Program Requested">
      <option value="">Select Program</option>
      <option>Full-Time Childcare</option>
      <option>Part-Time Care</option>
      <option>Overnight Care</option>
      <option>Before & After School</option>
    </select><br>
    <select name="Transportation Needed">
      <option value="">Transportation Needed?</option>
      <option>Yes</option>
      <option>No</option>
      <option>Maybe</option>
    </select><br>
    <textarea name="Additional Notes" placeholder="Additional information" rows="5"></textarea><br>
    <button type="submit">Submit Enrollment Request</button>
  </form>
</div>

<footer>Lee-Bella's No Place Like Home CDC</footer>

</body>
</html>
